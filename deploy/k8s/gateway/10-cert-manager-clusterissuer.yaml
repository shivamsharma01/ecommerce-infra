apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-gateway
spec:
  acme:
    # Production issuer
    server: https://acme-v02.api.letsencrypt.org/directory
    email: shivamsharma.ade@gmail.com
    privateKeySecretRef:
      name: letsencrypt-gateway-account-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - group: gateway.networking.k8s.io
                kind: Gateway
                name: mcart
                namespace: mcart-gateway

