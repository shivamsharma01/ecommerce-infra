apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mcart
  namespace: mcart-gateway
spec:
  gatewayClassName: envoy-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: mcart-tls
      allowedRoutes:
        namespaces:
          from: Same

