# install.yaml from Envoy Gateway does not create a GatewayClass — only CRDs + controller.
# Gateways need a GatewayClass whose controllerName matches Envoy Gateway.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-gateway
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: mcart-envoy-proxy
    namespace: envoy-gateway-system
