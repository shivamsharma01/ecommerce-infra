# install.yaml from Envoy Gateway does not create a GatewayClass — only CRDs + controller.
# Gateways need a GatewayClass whose controllerName matches Envoy Gateway.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-gateway
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
