# Public vs JWT at edge mirrors Spring Security in each service:
# - auth: permitAll on /auth/*, /.well-known, /oauth2, /login (see AuthorizationServerConfig)
# - product: GET/HEAD /api/** public; mutations need JWT + SCOPE_product.admin (SecurityConfig)
# - search: POST /api/search permitAll; GET/HEAD /api/** need JWT when scoped (SecurityConfig)
# - user: actuator/health/docs permitAll in-app; /user/** authenticated (SecurityConfig)
# - product-indexer: only /product-indexer/admin/** needs JWT + scopes; OPTIONS public for CORS
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcart-public
  namespace: mcart-gateway
  labels:
    app.kubernetes.io/name: mcart-gateway
spec:
  parentRefs:
    - name: mcart
  hostnames:
    - "mcart.space"
    - "www.mcart.space"
  rules:
    # Authorization Server + Auth REST must stay publicly reachable.
    - name: auth-oidc-and-rest
      matches:
        - path:
            type: PathPrefix
            value: "/.well-known"
        - path:
            type: PathPrefix
            value: "/oauth2"
        - path:
            type: PathPrefix
            value: "/login"
        - path:
            type: PathPrefix
            value: "/auth"
      backendRefs:
        - name: auth
          namespace: mcart
          port: 8081
    # Product catalog reads are public; writes stay on mcart-protected (JWT).
    - name: product-read-public
      matches:
        - path:
            type: PathPrefix
            value: "/api/products"
          method: GET
        - path:
            type: PathPrefix
            value: "/api/products"
          method: HEAD
        - path:
            type: PathPrefix
            value: "/api/products"
          method: OPTIONS
      backendRefs:
        - name: product
          namespace: mcart
          port: 80
    # springdoc / Swagger (must be before UI / catch-all).
    - name: product-openapi
      matches:
        - path:
            type: PathPrefix
            value: "/v3/api-docs"
          method: GET
        - path:
            type: PathPrefix
            value: "/v3/api-docs"
          method: HEAD
        - path:
            type: PathPrefix
            value: "/v3/api-docs"
          method: OPTIONS
        - path:
            type: PathPrefix
            value: "/swagger-ui"
          method: GET
        - path:
            type: PathPrefix
            value: "/swagger-ui"
          method: HEAD
        - path:
            type: PathPrefix
            value: "/swagger-ui"
          method: OPTIONS
      backendRefs:
        - name: product
          namespace: mcart
          port: 80
    # Search: POST /api/search is intentionally public in search SecurityConfig.
    - name: search-post-public
      matches:
        - path:
            type: PathPrefix
            value: "/api/search"
          method: POST
        - path:
            type: PathPrefix
            value: "/api/search"
          method: OPTIONS
      backendRefs:
        - name: search
          namespace: mcart
          port: 80
    # CORS preflight for /user (all /user API calls require JWT except OPTIONS).
    - name: user-options-public
      matches:
        - path:
            type: PathPrefix
            value: "/user"
          method: OPTIONS
      backendRefs:
        - name: user
          namespace: mcart
          port: 8082
    # CORS preflight for product-indexer admin (JWT required for real admin calls).
    - name: product-indexer-admin-options-public
      matches:
        - path:
            type: PathPrefix
            value: "/product-indexer/admin"
          method: OPTIONS
      backendRefs:
        - name: product-indexer
          namespace: mcart
          port: 80
    # UI catch-all (must be last)
    - name: ui
      matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: mcart-ui
          namespace: mcart
          port: 80

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcart-http-to-https
  namespace: mcart-gateway
spec:
  parentRefs:
    - name: mcart
      sectionName: http
  hostnames:
    - "mcart.space"
    - "www.mcart.space"
  rules:
    - name: redirect
      matches:
        - path:
            type: PathPrefix
            value: "/"
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcart-protected
  namespace: mcart-gateway
  labels:
    app.kubernetes.io/name: mcart-gateway
    mcart.security/jwt: "required"
spec:
  parentRefs:
    - name: mcart
  hostnames:
    - "mcart.space"
    - "www.mcart.space"
  rules:
    # Prevent clients from spoofing identity headers; only the gateway may add them.
    - name: protected-api
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - "x-mcart-user-id"
              - "x-mcart-auth-sub"
              - "x-mcart-auth-scope"
      matches:
        - path:
            type: PathPrefix
            value: "/api/products"
          method: POST
        - path:
            type: PathPrefix
            value: "/api/products"
          method: PUT
        - path:
            type: PathPrefix
            value: "/api/products"
          method: PATCH
        - path:
            type: PathPrefix
            value: "/api/products"
          method: DELETE
      backendRefs:
        - name: product
          namespace: mcart
          port: 80
    - name: protected-cart
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - "x-mcart-user-id"
              - "x-mcart-auth-sub"
              - "x-mcart-auth-scope"
      matches:
        - path:
            type: PathPrefix
            value: "/cart"
          method: GET
        - path:
            type: PathPrefix
            value: "/cart"
          method: POST
        - path:
            type: PathPrefix
            value: "/cart"
          method: DELETE
      backendRefs:
        - name: cart
          namespace: mcart
          port: 80
    - name: protected-orders
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - "x-mcart-user-id"
              - "x-mcart-auth-sub"
              - "x-mcart-auth-scope"
      matches:
        - path:
            type: PathPrefix
            value: "/orders"
          method: GET
        - path:
            type: PathPrefix
            value: "/orders"
          method: POST
      backendRefs:
        - name: order
          namespace: mcart
          port: 80
    - name: protected-search
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - "x-mcart-user-id"
              - "x-mcart-auth-sub"
              - "x-mcart-auth-scope"
      matches:
        # POST /api/search is public (see mcart-public.search-post-public).
        - path:
            type: PathPrefix
            value: "/api/search"
          method: GET
        - path:
            type: PathPrefix
            value: "/api/search"
          method: HEAD
        - path:
            type: PathPrefix
            value: "/api/search"
          method: PUT
        - path:
            type: PathPrefix
            value: "/api/search"
          method: PATCH
        - path:
            type: PathPrefix
            value: "/api/search"
          method: DELETE
      backendRefs:
        - name: search
          namespace: mcart
          port: 80
    - name: protected-user
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - "x-mcart-user-id"
              - "x-mcart-auth-sub"
              - "x-mcart-auth-scope"
      matches:
        - path:
            type: PathPrefix
            value: "/user"
          method: GET
        - path:
            type: PathPrefix
            value: "/user"
          method: HEAD
        - path:
            type: PathPrefix
            value: "/user"
          method: POST
        - path:
            type: PathPrefix
            value: "/user"
          method: PUT
        - path:
            type: PathPrefix
            value: "/user"
          method: PATCH
        - path:
            type: PathPrefix
            value: "/user"
          method: DELETE
      backendRefs:
        - name: user
          namespace: mcart
          port: 8082
    - name: protected-indexer
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - "x-mcart-user-id"
              - "x-mcart-auth-sub"
              - "x-mcart-auth-scope"
      matches:
        # Only /product-indexer/admin/** is secured in product-indexer SecurityConfig.
        - path:
            type: PathPrefix
            value: "/product-indexer/admin"
          method: GET
        - path:
            type: PathPrefix
            value: "/product-indexer/admin"
          method: HEAD
        - path:
            type: PathPrefix
            value: "/product-indexer/admin"
          method: POST
        - path:
            type: PathPrefix
            value: "/product-indexer/admin"
          method: PUT
        - path:
            type: PathPrefix
            value: "/product-indexer/admin"
          method: PATCH
        - path:
            type: PathPrefix
            value: "/product-indexer/admin"
          method: DELETE
      backendRefs:
        - name: product-indexer
          namespace: mcart
          port: 80

