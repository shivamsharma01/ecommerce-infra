apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: mcart-jwt
  namespace: mcart-gateway
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: mcart-protected
  jwt:
    providers:
      - name: mcart-auth
        issuer: https://mcart.space
        remoteJWKS:
          uri: https://mcart.space/oauth2/jwks
          cacheDuration: 5m
        # claimToHeaders is not valid on spec.jwt in Envoy Gateway v1.7.1 CRD (strict decode error).
        # JWT signature + issuer validation still applies; backends continue to validate the Bearer token.

