# Copy to secret.yaml (gitignored), replace every MY_* value, then: kubectl apply -n mcart -f secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
  labels:
    app: auth
type: Opaque
stringData:
  DB_PASSWORD: MY_PASSWORD
  REDIS_PASSWORD: MY_PASSWORD
  JWT_SECRET: MY_PASSWORD
  OAUTH2_CLIENT_SECRET: MY_PASSWORD
  SPRING_MAIL_USERNAME: MY_EMAIL
  SPRING_MAIL_PASSWORD: MY_PASSWORD
