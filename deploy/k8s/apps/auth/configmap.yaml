# Non-sensitive defaults. Override per environment with Kustomize/Helm or kubectl patch.
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-config
  labels:
    app: auth
data:
  SERVER_PORT: "8081"
  DB_URL: "jdbc:postgresql://mcart-pg-postgresql.mcart.svc.cluster.local:5432/auth"
  DB_USERNAME: "auth_user"
  REDIS_HOST: "mcart-redis-master.mcart.svc.cluster.local"
  REDIS_PORT: "6379"
  AUTH_ISSUER_URI: "https://mcart.space"
  AUTH_VERIFICATION_BASE_URL: "https://mcart.space"
  OAUTH2_REDIRECT_URI: "https://mcart.space/login/oauth2/code/client-app"
  OAUTH2_CLIENT_ID: "client-app"
  GCP_PROJECT_ID: "ecommerce-491019"
  AUTH_PUBSUB_USER_SIGNUP_TOPIC: "user-signup-events"
  AUTH_PUBSUB_EMAIL_VERIFICATION_TOPIC: "email-verification-events"
  JWT_ACCESS_TTL_SECONDS: "900"
  JWT_REFRESH_TTL_SECONDS: "2592000"
