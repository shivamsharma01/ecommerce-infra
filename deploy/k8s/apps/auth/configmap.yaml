# Non-sensitive defaults. Override per environment with Kustomize/Helm or kubectl patch.
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-config
  labels:
    app: auth
data:
  SERVER_PORT: "8081"
  DB_URL: "jdbc:postgresql://postgresql.auth.svc.cluster.local:5432/auth"
  DB_USERNAME: "auth_user"
  REDIS_HOST: "redis-service.auth.svc.cluster.local"
  REDIS_PORT: "6379"
  AUTH_ISSUER_URI: "https://auth.example.com"
  AUTH_VERIFICATION_BASE_URL: "https://auth.example.com"
  OAUTH2_REDIRECT_URI: "https://app.example.com/login/oauth2/code/client-app"
  OAUTH2_CLIENT_ID: "client-app"
  GCP_PROJECT_ID: "CHANGEME_GCP_PROJECT_ID"
  AUTH_PUBSUB_USER_SIGNUP_TOPIC: "user-signup-events"
  SPRING_MAIL_HOST: "smtp.gmail.com"
  SPRING_MAIL_PORT: "587"
  JWT_ACCESS_TTL_SECONDS: "900"
  JWT_REFRESH_TTL_SECONDS: "2592000"
