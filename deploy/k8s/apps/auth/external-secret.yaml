# Requires External Secrets Operator + a ClusterSecretStore (or SecretStore) backed by GCP Secret Manager.
# Create matching secrets in GSM (see ecomm-infra/docs/kubernetes-secrets-production.md). Do not commit real values.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-secrets
  labels:
    app: auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-cluster
    kind: ClusterSecretStore
  target:
    name: auth-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: mcart-auth-db-password
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: mcart-auth-redis-password
    - secretKey: JWT_SECRET
      remoteRef:
        key: mcart-auth-jwt-secret
    - secretKey: OAUTH2_CLIENT_SECRET
      remoteRef:
        key: mcart-auth-oauth2-client-secret
    - secretKey: SPRING_MAIL_USERNAME
      remoteRef:
        key: mcart-auth-smtp-username
    - secretKey: SPRING_MAIL_PASSWORD
      remoteRef:
        key: mcart-auth-smtp-password
