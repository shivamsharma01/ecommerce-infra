# Copy to secret.yaml when the search index uses HTTP basic auth. OpenSearch demo often has none; Bitnami ES did use elastic/MY_PASSWORD.
apiVersion: v1
kind: Secret
metadata:
  name: search-secrets
  labels:
    app: search
type: Opaque
stringData:
  # OpenSearch security demo uses the built-in admin user unless you customize it.
  OPENSEARCH_USERNAME: admin
  OPENSEARCH_PASSWORD: CHANGE_ME_Str0ng!
