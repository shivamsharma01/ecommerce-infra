# Apply as search-secrets in namespace mcart (kubectl apply -f …).
# Required when OpenSearch has the security plugin (e.g. OPENSEARCH_INITIAL_ADMIN_PASSWORD in Helm).
# OPENSEARCH_PASSWORD must match deploy/helm/values-opensearch.yaml → extraEnvs OPENSEARCH_INITIAL_ADMIN_PASSWORD.
apiVersion: v1
kind: Secret
metadata:
  name: search-secrets
  labels:
    app: search
type: Opaque
stringData:
  OPENSEARCH_USERNAME: admin
  # Must match OPENSEARCH_INITIAL_ADMIN_PASSWORD in your (gitignored) deploy/helm/values-opensearch.yaml
  OPENSEARCH_PASSWORD: CHANGE_ME_Str0ng!
