# Apply as search-secrets in namespace mcart (kubectl apply -f …).
# Required only when OpenSearch runs WITH the security plugin (no DISABLE_SECURITY_PLUGIN).
# If Helm uses DISABLE_SECURITY_PLUGIN=true, omit this secret or skip OPENSEARCH_* keys.
# When security is on, OPENSEARCH_PASSWORD must match OPENSEARCH_INITIAL_ADMIN_PASSWORD in Helm values.
apiVersion: v1
kind: Secret
metadata:
  name: search-secrets
  labels:
    app: search
type: Opaque
stringData:
  OPENSEARCH_USERNAME: admin
  # Must match OPENSEARCH_INITIAL_ADMIN_PASSWORD in your (gitignored) deploy/helm/values-opensearch.yaml
  OPENSEARCH_PASSWORD: CHANGE_ME_Str0ng!
