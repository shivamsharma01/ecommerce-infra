# Copy to secret.yaml when the search index uses HTTP basic auth. OpenSearch demo often has none; Bitnami ES did use elastic/MY_PASSWORD.
apiVersion: v1
kind: Secret
metadata:
  name: search-secrets
  labels:
    app: search
type: Opaque
stringData:
  SPRING_ELASTICSEARCH_USERNAME: elastic
  SPRING_ELASTICSEARCH_PASSWORD: MY_PASSWORD
