# Optional: use when Elasticsearch requires credentials or you override JWT settings via secrets.
# If search-secrets is not needed, omit this manifest; Deployment has optional: true on secretRef.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: search-secrets
  labels:
    app: search
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-cluster
    kind: ClusterSecretStore
  target:
    name: search-secrets
    creationPolicy: Owner
  data:
    - secretKey: SPRING_ELASTICSEARCH_USERNAME
      remoteRef:
        key: mcart-search-es-username
    - secretKey: SPRING_ELASTICSEARCH_PASSWORD
      remoteRef:
        key: mcart-search-es-password
