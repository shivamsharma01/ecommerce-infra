# Optional when Elasticsearch is open on the cluster network; required when ES uses authentication.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: product-indexer-secrets
  labels:
    app.kubernetes.io/name: product-indexer
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-cluster
    kind: ClusterSecretStore
  target:
    name: product-indexer-secrets
    creationPolicy: Owner
  data:
    - secretKey: SPRING_ELASTICSEARCH_USERNAME
      remoteRef:
        key: mcart-product-indexer-es-username
    - secretKey: SPRING_ELASTICSEARCH_PASSWORD
      remoteRef:
        key: mcart-product-indexer-es-password
