# Copy to secret.yaml when Elasticsearch uses auth. kubectl apply -n mcart -f secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: product-indexer-secrets
  labels:
    app.kubernetes.io/name: product-indexer
type: Opaque
stringData:
  SPRING_ELASTICSEARCH_USERNAME: elastic
  SPRING_ELASTICSEARCH_PASSWORD: MY_PASSWORD
