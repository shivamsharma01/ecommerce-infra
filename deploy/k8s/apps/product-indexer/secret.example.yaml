# Apply as product-indexer-secrets in namespace mcart.
# OpenSearch credentials are required only when the security plugin is enabled (no DISABLE_SECURITY_PLUGIN).
# With security off, omit OPENSEARCH_USERNAME / OPENSEARCH_PASSWORD or skip this secret.
apiVersion: v1
kind: Secret
metadata:
  name: product-indexer-secrets
  labels:
    app.kubernetes.io/name: product-indexer
type: Opaque
stringData:
  OPENSEARCH_USERNAME: admin
  # Must match OPENSEARCH_INITIAL_ADMIN_PASSWORD in your deploy/helm/values-opensearch.yaml
  OPENSEARCH_PASSWORD: CHANGE_ME_Str0ng!
