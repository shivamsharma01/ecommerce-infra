# Copy to secret.yaml when the search cluster uses HTTP basic auth (often unused with default OpenSearch).
apiVersion: v1
kind: Secret
metadata:
  name: product-indexer-secrets
  labels:
    app.kubernetes.io/name: product-indexer
type: Opaque
stringData:
  # OpenSearch security demo uses the built-in admin user unless you customize it.
  OPENSEARCH_USERNAME: admin
  OPENSEARCH_PASSWORD: CHANGE_ME_Str0ng!
