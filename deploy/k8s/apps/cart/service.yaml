# ClusterIP: port 80 → container port 8087 (named port http on Deployment).
apiVersion: v1
kind: Service
metadata:
  name: cart
  labels:
    app.kubernetes.io/name: cart
    app: cart
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cart
    app: cart
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

