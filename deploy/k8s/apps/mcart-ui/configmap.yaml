# Public, non-sensitive runtime config for the Angular SSR container.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcart-ui-config
  labels:
    app.kubernetes.io/name: mcart-ui
    app.kubernetes.io/component: frontend
data:
  NODE_ENV: "production"
  PORT: "4000"
  # Angular SSR SSRF guard — must match Host headers users hit (comma-separated). See angular.json security.allowedHosts.
  NG_ALLOWED_HOSTS: "localhost,mcart.space,www.mcart.space"
  # Public origin for browser/SSR API calls (must match Gateway hostname + TLS):
  API_BASE_URL: "https://mcart.space"
