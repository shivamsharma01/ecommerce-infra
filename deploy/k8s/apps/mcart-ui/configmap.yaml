# Public, non-sensitive runtime config for the Angular SSR container.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcart-ui-config
  labels:
    app.kubernetes.io/name: mcart-ui
    app.kubernetes.io/component: frontend
data:
  NODE_ENV: "production"
  PORT: "4000"
  # Browser / SSR may read API base URL from env at build or runtime — set to your public API or Ingress:
  API_BASE_URL: "https://mcart.store"
