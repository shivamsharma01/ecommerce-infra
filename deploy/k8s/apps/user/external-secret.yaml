# Syncs Kubernetes Secret user-secrets from GCP Secret Manager (requires ESO + ClusterSecretStore).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: user-secrets
  labels:
    app: user
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-cluster
    kind: ClusterSecretStore
  target:
    name: user-secrets
    creationPolicy: Owner
  data:
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: mcart-user-db-password
    # Only if not using Workload Identity for GCP APIs (prefer WI and omit this):
    # - secretKey: GOOGLE_APPLICATION_CREDENTIALS_JSON
    #   remoteRef:
    #     key: mcart-user-gcp-sa-json
