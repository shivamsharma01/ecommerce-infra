# Image tag should be updated by payment repo build pipeline.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  labels:
    app.kubernetes.io/name: payment
    app: payment
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: payment
      app: payment
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment
        app: payment
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: payment
          image: asia-south2-docker.pkg.dev/ecommerce-491019/docker-apps/payment:aec6e0939e93a648c0393a8ca3a7c735dfdb7956
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8088
          envFrom:
            - configMapRef:
                name: payment-config
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5

