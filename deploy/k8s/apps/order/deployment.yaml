apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
  labels:
    app.kubernetes.io/name: order
    app: order
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: order
      app: order
  template:
    metadata:
      labels:
        app.kubernetes.io/name: order
        app: order
    spec:
      serviceAccountName: order
      terminationGracePeriodSeconds: 30
      containers:
        - name: order
          image: asia-south2-docker.pkg.dev/ecommerce-491019/docker-apps/order:5f7fb85aef433d91bfa85ff12ea869e607b5d830
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8089
          envFrom:
            - configMapRef:
                name: order-config
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
