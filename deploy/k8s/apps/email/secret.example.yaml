# Copy to secret.yaml (gitignored), replace MY_* values, then: kubectl apply -n mcart -f secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: email-secrets
  labels:
    app: email
type: Opaque
stringData:
  SPRING_MAIL_USERNAME: MY_EMAIL
  SPRING_MAIL_PASSWORD: MY_APP_PASSWORD
  EMAIL_VERIFICATION_BASE_URL: "https://mcart.space"
  REDIS_PASSWORD: MY_REDIS_PASSWORD
