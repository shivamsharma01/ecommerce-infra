# GKE-only: Google-managed TLS for the Ingress below.
# Apply after the Ingress exists; certificate provisioning can take 15–60 minutes.
# Docs: https://cloud.google.com/kubernetes-engine/docs/how-to/managed-certs
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: mcart-store-cert
  namespace: mcart
spec:
  domains:
    - mcart.store
    - www.mcart.store
