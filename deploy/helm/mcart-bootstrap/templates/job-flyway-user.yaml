apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "mcart-bootstrap.fullname" . }}-flyway-user
  namespace: {{ .Values.namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "30"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z {{ .Values.postgresql.host }} {{ .Values.postgresql.port }}; do echo waiting for postgres; sleep 3; done
      containers:
        - name: flyway
          image: "{{ .Values.flyway.image }}:{{ .Values.flyway.tag }}"
          args:
            - migrate
          env:
            - name: FLYWAY_URL
              value: jdbc:postgresql://{{ .Values.postgresql.host }}:{{ .Values.postgresql.port }}/{{ .Values.user.database }}?sslmode=disable
            - name: FLYWAY_USER
              value: {{ .Values.user.username | quote }}
            - name: FLYWAY_LOCATIONS
              value: filesystem:/flyway/sql
            - name: FLYWAY_VALIDATE_ON_MIGRATE
              value: "true"
            {{- if .Values.existingSecret.enabled }}
            - name: FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret.name }}
                  key: {{ .Values.existingSecret.userPasswordKey }}
            {{- else }}
            - name: FLYWAY_PASSWORD
              value: {{ .Values.user.password | quote }}
            {{- end }}
          volumeMounts:
            - name: sql
              mountPath: /flyway/sql
      volumes:
        - name: sql
          configMap:
            name: {{ include "mcart-bootstrap.fullname" . }}-user-flyway-sql
