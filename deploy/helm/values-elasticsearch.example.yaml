# Bitnami Elasticsearch (single-node style — fine for dev / cost-sensitive; ops-heavy at scale)
#   helm upgrade --install mcart-es bitnami/elasticsearch -n mcart -f values-elasticsearch.yaml
#
# Tune resources for your node pool. For production at scale, prefer managed ES or a dedicated ops story.

global:
  kibanaEnabled: false

master:
  replicaCount: 1
  persistence:
    enabled: true
    size: 30Gi
  resources:
    requests:
      cpu: 500m
      memory: 2Gi

data:
  replicaCount: 1
  persistence:
    enabled: true
    size: 50Gi
  resources:
    requests:
      cpu: 500m
      memory: 2Gi

coordinating:
  replicaCount: 0

ingest:
  enabled: false

security:
  enabled: true
  elasticPassword: CHANGEME_ELASTIC_PASSWORD
  tls:
    autoGenerated: true
