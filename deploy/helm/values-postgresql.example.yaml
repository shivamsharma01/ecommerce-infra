# Bitnami PostgreSQL — install:
#   helm repo add bitnami https://charts.bitnami.com/bitnami
#   helm upgrade --install mcart-pg bitnami/postgresql -n mcart --create-namespace -f values-postgresql.yaml
#
# Replace MY_PASSWORD with strong distinct values before apply (examples use one placeholder).
# Use the same app-user passwords in mcart-bootstrap (auth, user, inventory, cart, payment, order).

auth:
  postgresPassword: MY_PASSWORD
  database: postgres
  username: postgres

primary:
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
  initdb:
    scripts:
      00-mcart-databases.sql: |
        CREATE USER auth_user WITH PASSWORD 'MY_PASSWORD';
        CREATE USER user_user WITH PASSWORD 'MY_PASSWORD';
        CREATE DATABASE auth OWNER auth_user;
        CREATE DATABASE "user" OWNER user_user;
        GRANT ALL PRIVILEGES ON DATABASE auth TO auth_user;
        GRANT ALL PRIVILEGES ON DATABASE "user" TO user_user;
