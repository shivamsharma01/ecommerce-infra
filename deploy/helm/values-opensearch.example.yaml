# OpenSearch (Elasticsearch-compatible REST API). Copy to values-opensearch.yaml and tune.
#   make data-install-es
#
# Service DNS (namespace mcart): opensearch-cluster-master.mcart.svc.cluster.local:9200
#
# =============================================================================
# Option A — Private dev cluster (simplest for Spring http:// clients)
# =============================================================================
# Disable the security plugin: no TLS on 9200, no admin password, no OPENSEARCH_* secrets
# in search / product-indexer. Use only behind a private network / namespace.
#
#   protocol: http
#   extraEnvs:
#     - name: DISABLE_SECURITY_PLUGIN
#       value: "true"
#
# Do NOT set OPENSEARCH_INITIAL_ADMIN_PASSWORD when security is disabled.
# After switching from a security-enabled install, delete the OpenSearch PVC once so the
# node starts clean (otherwise CrashLoop or inconsistent security state).
#
# =============================================================================
# Option B — Security enabled (production-style)
# =============================================================================
# Keep OPENSEARCH_INITIAL_ADMIN_PASSWORD, do NOT set DISABLE_SECURITY_PLUGIN.
# Use protocol: https and configure clients for TLS + basic auth (admin + that password).
# Do not hand-edit half a security opensearch.yml in Helm unless it matches OpenSearch 3.x
# docs; partial YAML often breaks transport SSL validation.
# =============================================================================

clusterName: opensearch-cluster
nodeGroup: master
singleNode: true
replicas: 1

protocol: http

opensearchJavaOpts: "-Xmx1G -Xms1G"

extraEnvs:
  - name: DISABLE_SECURITY_PLUGIN
    value: "true"

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    memory: 3Gi

persistence:
  enabled: true
  size: 20Gi
