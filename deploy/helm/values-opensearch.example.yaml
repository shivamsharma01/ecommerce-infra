# OpenSearch (Elasticsearch-compatible REST API). Copy to values-opensearch.yaml and tune.
#   make data-install-es
#
# Service DNS (namespace mcart): opensearch-cluster-master.mcart.svc.cluster.local:9200

clusterName: opensearch-cluster
nodeGroup: master
singleNode: true
replicas: 1

opensearchJavaOpts: "-Xmx1G -Xms1G"

# Required by OpenSearch Security demo installer (chart >= 2.18 / OpenSearch >= 2.12).
# Use a strong password (min 8 chars; upper+lower+digit+special).
extraEnvs:
  - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
    value: "CHANGE_ME_Str0ng!"

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    memory: 3Gi

persistence:
  enabled: true
  size: 20Gi
