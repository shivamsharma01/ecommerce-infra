# OpenSearch (Elasticsearch-compatible REST API). Copy to values-opensearch.yaml and tune.
#   make data-install-es
#
# Service DNS (namespace mcart): opensearch-cluster-master.mcart.svc.cluster.local:9200
#
# The chart defaults to protocol: https while Spring apps use http://…:9200. Without the
# config block, OpenSearch expects TLS on 9200 and closes plain HTTP ("Connection is closed").
# Use the same admin password in K8s secrets search-secrets / product-indexer-secrets.

clusterName: opensearch-cluster
nodeGroup: master
singleNode: true
replicas: 1

protocol: http

config:
  opensearch.yml: |
    cluster.name: opensearch-cluster
    network.host: 0.0.0.0
    plugins.security.ssl.http.enabled: false

opensearchJavaOpts: "-Xmx1G -Xms1G"

# Required by OpenSearch Security demo installer (chart >= 2.18 / OpenSearch >= 2.12).
# Use a strong password (min 8 chars; upper+lower+digit+special).
extraEnvs:
  - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
    value: "CHANGE_ME_Str0ng!"

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    memory: 3Gi

persistence:
  enabled: true
  size: 20Gi
