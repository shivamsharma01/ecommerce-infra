# DO NOT apply this file with placeholder values. Replace CHANGEME_* first, or use Terraform/Config Connector.
#
# Install External Secrets Operator first: https://external-secrets.io/
#
# This ClusterSecretStore lets ExternalSecret resources in any namespace sync from GCP Secret Manager.
# Grant the Kubernetes SA used below permission to access Secret Manager (e.g. roles/secretmanager.secretAccessor).
# Prefer Workload Identity (GKE) instead of storing a JSON key in the cluster.
#
# Adjust projectID, clusterName, clusterLocation, and serviceAccountRef to match your cluster.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcpsm-cluster
spec:
  provider:
    gcpsm:
      projectID: CHANGEME_GCP_PROJECT_ID
      auth:
        workloadIdentity:
          clusterLocation: CHANGEME_REGION
          clusterName: CHANGEME_GKE_CLUSTER_NAME
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
