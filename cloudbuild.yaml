# Cloud Build: apply GKE workloads (apps + Gateway API edge).
# IAM: grant the Cloud Build SA roles/container.developer on the project.
#
# Substitutions: _CLUSTER_NAME, _GKE_LOCATION, _GKE_LOCATION_KIND (zone|region), _K8S_NAMESPACE

substitutions:
  _CLUSTER_NAME: mcart-gke
  _GKE_LOCATION: asia-south2-a
  _GKE_LOCATION_KIND: zone
  _K8S_NAMESPACE: mcart

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s

steps:
  - id: gke-apply
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -ceu
      - |
        export DEBIAN_FRONTEND=noninteractive
        apt-get update -qq
        apt-get install -y -qq make curl
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

        case "${_GKE_LOCATION_KIND}" in
          region)
            gcloud container clusters get-credentials "${_CLUSTER_NAME}" \
              --region="${_GKE_LOCATION}" \
              --project="${PROJECT_ID}"
            ;;
          *)
            gcloud container clusters get-credentials "${_CLUSTER_NAME}" \
              --zone="${_GKE_LOCATION}" \
              --project="${PROJECT_ID}"
            ;;
        esac

        cd deploy
        make apps-apply NS="${_K8S_NAMESPACE}"
        make gateway-install
        make gateway-apply
